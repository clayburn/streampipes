@if (showAssetBrowser) {
    <div fxLayoutAlign="end center">
        <button
            mat-flat-button
            class="btn-secondary-outline btn-filter"
            color="secondary"
            data-cy="filter-button"
            [matMenuTriggerFor]="menu"
            #menuTrigger="matMenuTrigger"
            [matTooltip]="'Filter assets' | translate"
            [disabled]="filterDisabled"
            (menuClosed)="menuTrigger.closeMenu()"
        >
            <mat-icon [class.active-filters]="filterActive"
                >filter_alt</mat-icon
            >
            @if (filterActive) {
                <span>{{
                    selectedAssetCount + ' of ' + allAssetCount + ' ' + 'assets'
                }}</span>
            } @else {
                <span>{{ 'All assets' | translate }}</span>
            }
        </button>
        <mat-menu #menu="matMenu" fxFlex="100" class="large-menu">
            <sp-asset-browser-filter
                (closeMenu)="closeMenu()"
                [assetBrowserData]="assetBrowserData"
            >
            </sp-asset-browser-filter>
        </mat-menu>
    </div>
}
