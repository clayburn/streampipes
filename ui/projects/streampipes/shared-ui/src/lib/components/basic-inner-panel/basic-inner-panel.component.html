<div
    fxLayout="column"
    fxFlex="100"
    class="panel-outer"
    [ngStyle]="{ margin: outerMargin }"
>
    @if (!hideToolbar) {
        <div
            class="general-panel-header"
            [class.header-collapsed]="collapsed"
            [ngClass]="headerBackground ? 'bg-highlight' : 'bg-no-highlight'"
            [style.height]="headerHeight"
            fxLayout="row"
            fxLayoutAlign="start center"
        >
            <div fxLayout="fill" fxFlex="100">
                <div fxLayoutAlign="start center" fxLayout="row">
                    @if (showTitle) {
                        <div class="content-box-title text-lg">
                            {{ panelTitle }}
                        </div>
                    }
                </div>
                <ng-content select="[header]" class="pr-5"></ng-content>
                <div fxFlex></div>
                @if (collapsible) {
                    <button
                        type="button"
                        class="collapse-btn"
                        (click)="toggleCollapse(); $event.stopPropagation()"
                    >
                        <mat-icon
                            class="chevron-icon"
                            [class.collapsed]="collapsed"
                        >
                            expand_less
                        </mat-icon>
                    </button>
                }
            </div>
        </div>
    }

    <div
        class="general-panel-wrapper"
        [@collapseExpand]="
            collapsible ? (collapsed ? 'collapsed' : 'expanded') : 'expanded'
        "
    >
        <div class="general-panel" [ngStyle]="{ padding: innerPadding }">
            <ng-content></ng-content>
        </div>
    </div>
</div>
