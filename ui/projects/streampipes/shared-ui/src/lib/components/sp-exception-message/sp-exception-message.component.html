<div fxFlex="100" fxLayout="row" class="w-100" data-cy="display-exception">
    <sp-alert-banner
        type="error"
        class="w-100"
        [showDetailsButton]="showDetails"
        (detailsButtonClicked)="openDetailsDialog()"
        [title]="'Error' | translate"
        [description]="
            message.title || 'An unknown error has occurred' | translate
        "
    >
        @if (messageTimestamp) {
            <h5 class="mr-15">
                {{ messageTimestamp | date: 'short' }}
            </h5>
        }
    </sp-alert-banner>
</div>
