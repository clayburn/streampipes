<div fxLayout="column">
    <table mat-table class="sp-table" [dataSource]="dataSource">
        <ng-content></ng-content>

        @if (showActionsMenu) {
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let element">
                    <div fxLayoutAlign="end center">
                        @if (featureCardId) {
                            <button
                                [matTooltip]="'Preview' | translate"
                                mat-icon-button
                                (click)="
                                    openFeatureCard(element);
                                    $event.stopPropagation()
                                "
                            >
                                <mat-icon>preview</mat-icon>
                            </button>
                        }
                        <div
                            [matMenuTriggerFor]="menu"
                            #menuTrigger="matMenuTrigger"
                            (mouseenter)="mouseEnter(menuTrigger)"
                            (mouseleave)="mouseLeave(menuTrigger)"
                        >
                            <button
                                mat-icon-button
                                [matMenuTriggerFor]="menu"
                                #menuTrigger="matMenuTrigger"
                                (click)="$event.stopPropagation()"
                                [attr.data-cy]="'more-options'"
                            >
                                <mat-icon>more_vert</mat-icon>
                            </button>
                        </div>
                        <mat-menu #menu="matMenu" [hasBackdrop]="false">
                            <div
                                (mouseenter)="mouseEnter(menuTrigger)"
                                (mouseleave)="mouseLeave(menuTrigger)"
                            >
                                <ng-container
                                    *ngTemplateOutlet="
                                        actionsTemplate;
                                        context: { $implicit: element }
                                    "
                                >
                                </ng-container>
                            </div>
                        </mat-menu>
                    </div>
                </td>
            </ng-container>
        }

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr
            mat-row
            *matRowDef="let row; columns: columns"
            (click)="rowClicked.emit(row)"
            [ngClass]="rowsClickable ? 'cursor-pointer' : ''"
        ></tr>

        <tr class="mat-row" *matNoDataRow>
            <td
                data-cy="no-table-entries"
                class="mat-cell"
                [colSpan]="columns.length"
            >
                {{ 'No entries available.' | translate }}
            </td>
        </tr>
    </table>
    <div fxFlex="100" fxLayoutAlign="end end" class="paginator-container">
        <mat-paginator
            #paginator
            [pageSize]="pageSize()"
            [pageSizeOptions]="[5, 10, 20, 50]"
            [hidePageSize]="false"
            [showFirstLastButtons]="true"
            (page)="onPage($event)"
        >
        </mat-paginator>
    </div>
</div>
