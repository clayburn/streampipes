<section
    [class.compact]="compact"
    [class.section-outline]="outline"
    [class.section-outline-compact]="level === 3"
    [class.section-outer-compact]="level === 3"
    class="section-outer"
>
    <header class="section-header">
        <sp-basic-header-title-component
            [level]="level"
            [title]="title"
            [description]="subtitle"
        >
        </sp-basic-header-title-component>

        <div class="header-actions">
            <ng-content select="[section-actions]"></ng-content>
        </div>
    </header>

    <div
        class="section-body"
        [class.section-body-compact]="level === 3"
        role="group"
        fxLayout="column"
    >
        <ng-content></ng-content>
    </div>
</section>
