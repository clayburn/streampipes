<sp-configuration-box [title]="'Data Range' | translate">
    <mat-radio-group
        class="sp-radio-group"
        [(ngModel)]="dataExportConfig.dataRangeConfiguration"
    >
        @if (dataExplorerDataConfig) {
            <mat-radio-button
                value="visible"
                class="sp-radio-button"
                data-cy="download-configuration-visible"
            >
                {{ 'Currently configured query' | translate }}
            </mat-radio-button>
        }
        <mat-radio-button
            value="all"
            class="sp-radio-button"
            data-cy="download-configuration-all"
        >
            {{ 'All data in database' | translate }}
        </mat-radio-button>
        <mat-radio-button
            value="customInterval"
            class="sp-radio-button"
            data-cy="download-configuration-customInterval"
        >
            {{ 'All data in custom time interval' | translate }}
        </mat-radio-button>

        @if (dataExportConfig.dataRangeConfiguration === 'customInterval') {
            <div fxLayout="row" fxLayoutGap="10px" class="ml-35">
                <div>
                    <h5>{{ 'From' | translate }}&nbsp;</h5>
                    <sp-date-input
                        [(date)]="dataExportConfig.dateRange.startDate"
                    >
                    </sp-date-input>
                </div>
                <div>
                    <h5>{{ 'To' | translate }}</h5>
                    <sp-date-input
                        [(date)]="dataExportConfig.dateRange.endDate"
                    >
                    </sp-date-input>
                </div>
            </div>
        }
    </mat-radio-group>
</sp-configuration-box>
