<div class="page-container-padding-inner" fxLayout="column">
    <sp-split-section
        [level]="2"
        [title]="('Basics' | translate) + ': ' + asset.assetName"
    >
        <sp-form-field
            [level]="2"
            [label]="'Name' | translate"
            [description]="'A short name of the asset' | translate"
        >
            <mat-form-field>
                <input
                    data-cy="asset-name"
                    matInput
                    [(ngModel)]="asset.assetName"
                    [disabled]="!editMode"
                />
            </mat-form-field>
        </sp-form-field>
        <sp-form-field
            fxFlex="100"
            [level]="2"
            [label]="'Description' | translate"
            [description]="'A longer description of this asset' | translate"
        >
            <mat-form-field>
                <input
                    matInput
                    [(ngModel)]="asset.assetDescription"
                    [disabled]="!editMode"
                />
            </mat-form-field>
        </sp-form-field>
        <sp-form-field
            fxFlex="100"
            [level]="2"
            label="Asset ID"
            [description]="'A unique id for this asset in one word' | translate"
        >
            <mat-form-field>
                <input
                    matInput
                    [(ngModel)]="asset.assetId"
                    [disabled]="!editMode"
                />
            </mat-form-field>
        </sp-form-field>
        <sp-form-field
            fxFlex="100"
            [level]="2"
            [label]="'Asset Type' | translate"
            [description]="'The ISA95 type of this asset' | translate"
        >
            <mat-form-field class="w-100">
                <mat-select
                    data-cy="asset-type-select"
                    [disabled]="!editMode"
                    [(ngModel)]="asset.assetType.isa95AssetType"
                    [aria-label]="'Asset Type' | translate"
                >
                    @for (isaType of isa95Types; track isaType) {
                        <mat-option
                            [value]="isaType.type"
                            [attr.data-cy]="'option-' + isaType.type"
                            >{{ isaType.label }}
                        </mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </sp-form-field>
    </sp-split-section>
    <sp-split-section
        [level]="2"
        [title]="'Labels & custom fields' | translate"
    >
        <sp-asset-details-labels [asset]="asset" [editMode]="editMode">
        </sp-asset-details-labels>
        <sp-asset-details-custom-fields [asset]="asset" [editMode]="editMode">
        </sp-asset-details-custom-fields>
    </sp-split-section>
    @if (rootNode) {
        <sp-split-section [level]="2" [title]="'Sites' | translate">
            <sp-asset-details-site
                [asset]="asset"
                [sites]="sites"
                [editMode]="editMode"
            >
            </sp-asset-details-site>
        </sp-split-section>
    }

    <sp-asset-details-links
        [asset]="asset"
        [assetModel]="assetModel"
        [editMode]="true"
    >
    </sp-asset-details-links>
</div>
