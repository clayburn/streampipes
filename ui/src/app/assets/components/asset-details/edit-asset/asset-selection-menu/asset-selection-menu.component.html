<div fxLayout="column" class="asset-selection-outer">
    <div fxLayout="column" class="m-md">
        @for (option of flatAssets; track option.asset.assetId) {
            <div
                class="option-content p-md"
                [style.padding-left.px]="option.depth * 12"
                (click)="selectAsset(option.asset)"
            >
                <mat-icon class="option-icon">
                    {{ option.depth === 0 ? 'home' : 'account_tree' }}
                </mat-icon>
                <span class="option-label">
                    {{ option.label }}
                </span>
            </div>
        }
    </div>
</div>
