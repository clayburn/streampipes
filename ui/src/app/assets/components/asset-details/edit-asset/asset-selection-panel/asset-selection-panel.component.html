<div fxLayout="row" fxFlex="100">
    @if (assetModel) {
        <div fxFlex="30" fxLayout="column" class="designer-panel-content">
            <sp-basic-view
                class="w-100"
                [showBackLink]="false"
                [padding]="false"
            >
                <div nav fxLayout="row" fxLayoutAlign="space-between center">
                    <span class="txt-lg ml-md">{{
                        'Select asset to view details' | translate
                    }}</span>
                </div>

                <div
                    fxFlex="100"
                    class="w-100"
                    fxLayout="column"
                    fxLayoutGap="12px"
                >
                    <div fxFlex="100" class="tree-wrapper">
                        <mat-tree
                            [dataSource]="dataSource"
                            [treeControl]="treeControl"
                            class="sp-tree"
                            #tree
                        >
                            <mat-tree-node
                                *matTreeNodeDef="let node"
                                matTreeNodeToggle
                                class="tree-leaf"
                            >
                                <div
                                    class="asset-node"
                                    [class.selected-node]="
                                        node.assetId === selectedAsset.assetId
                                    "
                                    [attr.data-cy]="
                                        'select-asset-' + node.assetName
                                    "
                                    (click)="selectNode(node, false)"
                                >
                                    <div class="node-main">
                                        <mat-icon
                                            class="node-icon"
                                            [class.node-icon-selected]="
                                                node.assetId ===
                                                selectedAsset.assetId
                                            "
                                            color="primary"
                                        >
                                            device_hub
                                        </mat-icon>
                                        <div class="node-text">
                                            <div
                                                class="node-title"
                                                [class.font-emphasized]="
                                                    node.assetId ===
                                                    selectedAsset.assetId
                                                "
                                            >
                                                {{ node.assetName }}
                                            </div>
                                            <div class="node-meta">
                                                {{ node.assetDescription }}
                                            </div>
                                        </div>
                                    </div>
                                    @if (editMode) {
                                        <div class="node-actions">
                                            <button
                                                mat-icon-button
                                                [attr.data-cy]="
                                                    'add-asset-' +
                                                    node.assetName
                                                "
                                                (click)="addAsset(node)"
                                                color="accent"
                                            >
                                                <mat-icon>add</mat-icon>
                                            </button>
                                            <button
                                                mat-icon-button
                                                (click)="deleteAsset(node)"
                                                color="accent"
                                            >
                                                <mat-icon>delete</mat-icon>
                                            </button>
                                        </div>
                                    }
                                </div>
                            </mat-tree-node>

                            <mat-nested-tree-node
                                *matTreeNodeDef="let node; when: hasChild"
                            >
                                <div class="mat-tree-node">
                                    <button
                                        mat-icon-button
                                        matTreeNodeToggle
                                        class="node-toggle"
                                        [attr.data-cy]="
                                            'button-' + node.assetName
                                        "
                                        [attr.aria-label]="
                                            'Toggle ' + node.nodeName
                                        "
                                    >
                                        <mat-icon class="mat-icon-rtl-mirror">
                                            {{
                                                treeControl.isExpanded(node)
                                                    ? 'expand_more'
                                                    : 'chevron_right'
                                            }}
                                        </mat-icon>
                                    </button>
                                    <div
                                        class="asset-node"
                                        [class.root-node]="
                                            node.assetId === assetModel.assetId
                                        "
                                        (click)="selectNode(node, true)"
                                    >
                                        <div class="node-main">
                                            <mat-icon
                                                class="node-icon"
                                                [class.node-icon-selected]="
                                                    node.assetId ===
                                                    selectedAsset.assetId
                                                "
                                            >
                                                account_tree
                                            </mat-icon>
                                            <div class="node-text">
                                                <div
                                                    class="node-title"
                                                    [class.font-emphasized]="
                                                        node.assetId ===
                                                        selectedAsset.assetId
                                                    "
                                                >
                                                    {{ node.assetName }}
                                                </div>
                                            </div>
                                            @if (
                                                node.assetId ===
                                                assetModel.assetId
                                            ) {
                                                <span class="badge">Root</span>
                                            }
                                        </div>
                                        @if (editMode) {
                                            <div class="node-actions">
                                                <button
                                                    mat-icon-button
                                                    (click)="addAsset(node)"
                                                    [attr.data-cy]="
                                                        'add-asset-' +
                                                        node.assetName
                                                    "
                                                    color="accent"
                                                >
                                                    <mat-icon>add</mat-icon>
                                                </button>
                                            </div>
                                        }
                                    </div>
                                </div>
                                <div
                                    [class.sp-tree-invisible]="
                                        !treeControl.isExpanded(node)
                                    "
                                    role="group"
                                >
                                    <ng-container
                                        matTreeNodeOutlet
                                    ></ng-container>
                                </div>
                            </mat-nested-tree-node>
                        </mat-tree>
                    </div>
                </div>
            </sp-basic-view>
        </div>
        <div fxFlex="70">
            <ng-content></ng-content>
        </div>
    }
</div>
