<div fxFlex="100" fxLayout="row" fxLayoutAlign="center start">
    <sp-table
        fxFlex="100"
        [columns]="displayedColumns"
        [dataSource]="dataSource"
        [showActionsMenu]="true"
        [rowsClickable]="true"
        (rowClicked)="openDetails($event)"
        data-cy="all-adapters-table"
        matSort
    >
        <ng-container matColumnDef="type">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>
                {{ 'Type' | translate }}
            </th>
            <td mat-cell *matCellDef="let assetLink">
                <div
                    fxLayout="column"
                    fxLayoutAlign="start start"
                    class="truncate"
                >
                    <sp-asset-link-table-type
                        [assetLink]="assetLink"
                        [assetLinkTypes]="assetLinkTypes"
                        class="mt-sm mb-sm"
                    >
                    </sp-asset-link-table-type>
                </div>
            </td>
        </ng-container>
        <ng-container matColumnDef="linkLabel">
            <th mat-header-cell mat-sort-header *matHeaderCellDef>
                {{ 'Name' | translate }}
            </th>
            <td
                mat-cell
                *matCellDef="let assetLink"
                data-cy="asset-links-table"
            >
                <div
                    fxLayout="column"
                    fxLayoutAlign="start start"
                    class="truncate"
                >
                    <span>{{ assetLink.linkLabel }}</span>
                </div>
            </td>
        </ng-container>
        <ng-container matColumnDef="additionalInfo">
            <th mat-header-cell *matHeaderCellDef>Info</th>
            <td mat-cell *matCellDef="let assetLink">
                <sp-asset-link-table-additional-data
                    [isAdminUser]="isAdminUser"
                    [assetLink]="assetLink"
                    [certificates]="certificates"
                >
                </sp-asset-link-table-additional-data>
            </td>
        </ng-container>

        <ng-template spTableActions let-element>
            <button
                mat-menu-item
                data-cy="details-asset-link"
                (click)="openDetails(element)"
            >
                <mat-icon>visibility</mat-icon>
                <span>{{ 'Details' | translate }}</span>
            </button>
            <button
                mat-menu-item
                data-cy="navigate-asset-link"
                (click)="navigate(element)"
            >
                <mat-icon>open_in_new</mat-icon>
                <span>{{ 'Navigate' | translate }}</span>
            </button>
            @if (editMode) {
                <button
                    mat-menu-item
                    data-cy="edit-asset-link"
                    (click)="openEditAssetLinkDialog(element)"
                >
                    <mat-icon>edit</mat-icon>
                    <span>{{ 'Edit' | translate }}</span>
                </button>
                <button
                    mat-menu-item
                    data-cy="delete-asset-link"
                    (click)="deleteAssetLink(element)"
                >
                    <mat-icon>delete</mat-icon>
                    <span>{{ 'Delete' | translate }}</span>
                </button>
            }
        </ng-template>
    </sp-table>
</div>
