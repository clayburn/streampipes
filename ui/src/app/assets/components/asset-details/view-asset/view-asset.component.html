@if (asset) {
    <div fxLayout="column">
        <sp-asset-top-banner
            [assetModel]="asset"
            [locationConfig]="locationConfig"
        ></sp-asset-top-banner>

        <sp-basic-view
            [showBackLink]="true"
            [backLinkTarget]="['assets']"
            [padding]="false"
            fxFlex="100"
        >
            <div nav fxLayoutAlign="start center" fxFlex="100">
                @if (asset) {
                    <span fxFlex></span>
                    <button
                        mat-flat-button
                        class="mat-basic ml-md"
                        color="secondary"
                        data-cy="filter-button"
                        [matMenuTriggerFor]="menu"
                        #menuTrigger="matMenuTrigger"
                        [matTooltip]="'Show subassets' | translate"
                        (menuClosed)="menuTrigger.closeMenu()"
                    >
                        <span>{{ selectedAsset.assetName }}</span>
                        <mat-icon>expand_circle_down</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu" fxFlex="100" class="large-menu">
                        <sp-asset-selection-menu
                            (assetSelected)="applySelectedAsset($event)"
                            [assetModel]="asset"
                            [selectedAsset]="selectedAsset"
                        >
                        </sp-asset-selection-menu>
                    </mat-menu>
                }
            </div>
            @if (selectedAsset) {
                <div
                    fxLayout="column"
                    class="page-container-padding-inner p-10"
                >
                    @if (selectedAsset.assetId !== asset.assetId) {
                        <sp-view-asset-basics
                            [sites]="sites"
                            [selectedAsset]="selectedAsset"
                            fxFlex="100"
                        ></sp-view-asset-basics>
                    }
                    @if (asset.additionalData.customFields) {
                        <sp-split-section
                            [level]="2"
                            [title]="'Custom fields' | translate"
                        >
                            <sp-asset-details-custom-fields
                                [asset]="selectedAsset"
                                [editMode]="false"
                            ></sp-asset-details-custom-fields>
                        </sp-split-section>
                    }
                    <sp-view-asset-links
                        [selectedAsset]="selectedAsset"
                        class="w-100"
                    >
                    </sp-view-asset-links>
                </div>
            }
        </sp-basic-view>
    </div>
}
