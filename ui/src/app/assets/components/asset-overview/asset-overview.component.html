<sp-basic-view [showBackLink]="false" [padding]="true">
    <div
        nav
        fxFlex="100"
        fxLayoutAlign="start center"
        fxLayout="row"
        class="pl-10"
    >
        <button
            *ngIf="hasWritePrivilege"
            mat-button
            mat-flat-button
            color="accent"
            data-cy="create-new-asset-button"
            (click)="createNewAsset()"
        >
            <i class="material-icons">add</i>&nbsp;New asset
        </button>
        <div fxFlex fxLayout="row" fxLayoutAlign="end center">
            <button
                mat-icon-button
                matTooltip="Refresh assets"
                matTooltipPosition="below"
                color="accent"
                (click)="loadAssets()"
            >
                <i class="material-icons"> refresh </i>
            </button>
        </div>
    </div>
    <div fxFlex="100" fxLayout="column">
        <sp-basic-header-title-component
            title="Assets"
        ></sp-basic-header-title-component>
        <div fxFlex="100" fxLayout="row" fxLayoutAlign="center start">
            <div fxFlex="90" fxLayout="column">
                <sp-table
                    fxFlex="100"
                    [columns]="displayedColumns"
                    [dataSource]="dataSource"
                    [showActionsMenu]="true"
                    [rowsClickable]="true"
                    (rowClicked)="goToDetailsView($event)"
                    matSort
                >
                    <ng-container matColumnDef="name">
                        <th mat-header-cell mat-sort-header *matHeaderCellDef>
                            Asset
                        </th>
                        <td
                            mat-cell
                            *matCellDef="let asset"
                            data-cy="assets-table"
                        >
                            <div fxLayout="row" fxLayoutAlign="start center">
                                <div
                                    fxLayoutAlign="center start"
                                    fxLayout="column"
                                >
                                    <div>
                                        <b>{{ asset.assetName }}</b>
                                    </div>
                                    <div>
                                        <small>
                                            {{ asset.assetDescription }}</small
                                        >
                                    </div>
                                </div>
                            </div>
                        </td>
                    </ng-container>
                    <ng-template spTableActions let-element>
                        <button
                            mat-menu-item
                            (click)="goToDetailsView(element)"
                        >
                            <mat-icon>search</mat-icon>
                            <span>{{ 'Show' | translate }}</span>
                        </button>
                        <button
                            *ngIf="hasWritePrivilege"
                            mat-menu-item
                            data-cy="edit-asset-button"
                            [attr.data-cy]="'edit-asset-' + element.assetName"
                            (click)="goToDetailsView(element, true)"
                        >
                            <mat-icon>edit</mat-icon>
                            <span>{{ 'Edit' | translate }}</span>
                        </button>

                        <button
                            *ngIf="hasWritePrivilege"
                            mat-menu-item
                            data-cy="delete"
                            [attr.data-cy]="'delete-asset-' + element.assetName"
                            (click)="deleteAsset(element)"
                        >
                            <mat-icon>delete</mat-icon>
                            <span>{{ 'Delete' | translate }}</span>
                        </button>
                    </ng-template>
                </sp-table>
            </div>
        </div>
    </div>
</sp-basic-view>
