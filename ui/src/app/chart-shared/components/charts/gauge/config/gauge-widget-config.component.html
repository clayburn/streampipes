<sp-visualization-config-outer
    [configurationValid]="
        currentlyConfiguredWidget.visualizationConfig.configurationValid
    "
>
    <sp-split-section [level]="3" [title]="'Field' | translate">
        <sp-select-single-property-config
            [availableProperties]="fieldProvider.numericFields"
            [selectedProperty]="
                currentlyConfiguredWidget.visualizationConfig.selectedProperty
            "
            (changeSelectedProperty)="setSelectedProperty($event)"
        >
        </sp-select-single-property-config>
    </sp-split-section>
    @if (
        currentlyConfiguredWidget.visualizationConfig.selectedProperty
            ?.fieldCharacteristics.numeric
    ) {
        <sp-split-section [level]="3" [title]="'Settings' | translate">
            <sp-form-field [level]="3" [label]="'Min' | translate">
                <mat-form-field appearance="outline" color="accent" fxFlex="30">
                    <input
                        matInput
                        type="number"
                        [(ngModel)]="
                            currentlyConfiguredWidget.visualizationConfig.min
                        "
                        (ngModelChange)="triggerViewRefresh()"
                    />
                </mat-form-field>
            </sp-form-field>
            <sp-form-field [level]="3" [label]="'Max' | translate">
                <mat-form-field appearance="outline" color="accent" fxFlex="30">
                    <input
                        matInput
                        type="number"
                        [(ngModel)]="
                            currentlyConfiguredWidget.visualizationConfig.max
                        "
                        (ngModelChange)="triggerViewRefresh()"
                    />
                </mat-form-field>
            </sp-form-field>
            <sp-form-field [level]="3" [label]="'Display Name' | translate">
                <mat-form-field appearance="outline" color="accent" fxFlex="60">
                    <input
                        matInput
                        type="text"
                        [(ngModel)]="
                            currentlyConfiguredWidget.visualizationConfig
                                .displayName
                        "
                        (ngModelChange)="triggerViewRefresh()"
                    />
                </mat-form-field>
            </sp-form-field>
        </sp-split-section>
    }
</sp-visualization-config-outer>
