<sp-visualization-config-outer
    [configurationValid]="
        currentlyConfiguredWidget.visualizationConfig.configurationValid
    "
>
    <sp-split-section [level]="3" [title]="'Field' | translate">
        <sp-select-single-property-config
            [availableProperties]="fieldProvider.allFields"
            [selectedProperty]="
                currentlyConfiguredWidget.visualizationConfig.selectedProperty
            "
            (changeSelectedProperty)="setSelectedProperty($event)"
        >
        </sp-select-single-property-config>
    </sp-split-section>

    <sp-split-section [level]="3" [title]="'Settings' | translate">
        @if (
            currentlyConfiguredWidget.visualizationConfig.selectedProperty
                ?.fieldCharacteristics.numeric
        ) {
            <sp-form-field [level]="3" [label]="'Rounding' | translate">
                <mat-form-field
                    appearance="outline"
                    class="marginColorField"
                    color="accent"
                >
                    <mat-select
                        [(value)]="
                            currentlyConfiguredWidget.visualizationConfig
                                .roundingValue
                        "
                        (selectionChange)="updateRoundingValue($event.value)"
                    >
                        <mat-option [value]="100">100</mat-option>
                        <mat-option [value]="10">10</mat-option>
                        <mat-option [value]="1">1</mat-option>
                        <mat-option [value]="0.1">0.1</mat-option>
                        <mat-option [value]="0.01">0.01</mat-option>
                    </mat-select>
                </mat-form-field>
            </sp-form-field>
        }

        <sp-form-field [level]="3" [label]="'Inner Radius' | translate">
            <mat-slider min="0" max="80" step="1">
                <input
                    matSliderThumb
                    [ngModel]="
                        currentlyConfiguredWidget.visualizationConfig
                            .selectedRadius
                    "
                    (ngModelChange)="updateInnerRadius($event)"
                    #slider
                />
            </mat-slider>
            <small>{{ slider.value }}% </small>
        </sp-form-field>

        <sp-color-mapping-options-config
            [(colorMapping)]="
                currentlyConfiguredWidget.visualizationConfig
                    .colorMappingsPieChart
            "
            [selectedProperty]="
                currentlyConfiguredWidget.visualizationConfig.selectedProperty
            "
            [(showCustomColorMapping)]="
                currentlyConfiguredWidget.visualizationConfig
                    .showCustomColorMappingPieChart
            "
            (viewRefreshEmitter)="triggerViewUpdate()"
        >
        </sp-color-mapping-options-config>
    </sp-split-section>
</sp-visualization-config-outer>
