<sp-visualization-config-outer
    [configurationValid]="
        currentlyConfiguredWidget.visualizationConfig.configurationValid
    "
>
    <sp-split-section [level]="3" [title]="'Field' | translate">
        <sp-select-single-property-config
            [availableProperties]="fieldProvider.numericFields"
            [selectedProperty]="
                currentlyConfiguredWidget.visualizationConfig
                    .selectedFieldToObserve
            "
            (changeSelectedProperty)="selectFieldToObserve($event)"
        >
        </sp-select-single-property-config>
    </sp-split-section>

    <sp-split-section [level]="3" [title]="'Settings' | translate">
        <sp-form-field [level]="3" [label]="'Threshold' | translate">
            <mat-form-field>
                <input
                    type="text"
                    [(ngModel)]="
                        currentlyConfiguredWidget.visualizationConfig
                            .selectedThreshold
                    "
                    matInput
                    (input)="selectThreshold($event.target.value)"
                    [pattern]="'[0-9.,]*'"
                    (keydown)="restrictInput($event)"
                />
            </mat-form-field>
        </sp-form-field>
        <sp-form-field [level]="3" [label]="'With Threshold being' | translate">
            <mat-radio-group
                [(ngModel)]="
                    currentlyConfiguredWidget.visualizationConfig
                        .selectedUpperLimit
                "
                (change)="selectUpperLimit($event.source.value)"
            >
                <mat-radio-button [value]="true">{{
                    'Upper Limit' | translate
                }}</mat-radio-button>
                <mat-radio-button [value]="false">{{
                    'Lower Limit' | translate
                }}</mat-radio-button>
            </mat-radio-group>
        </sp-form-field>
        <sp-form-field [level]="3" [label]="'Warning Range (%)' | translate">
            <mat-form-field>
                <input
                    [(ngModel)]="
                        currentlyConfiguredWidget.visualizationConfig
                            .selectedWarningRange
                    "
                    matInput
                    type="text"
                    (input)="selectWarningRange($event.target.value)"
                    [pattern]="'[0-9.,]*'"
                    (keydown)="restrictInput($event)"
                />
                @if (warningRangeInterval) {
                    <div class="warning-range-info text-sm">
                        <small>{{ warningRangeInterval }}</small>
                    </div>
                }
            </mat-form-field>
        </sp-form-field>
        <mat-checkbox
            color="accent"
            [(ngModel)]="
                currentlyConfiguredWidget.visualizationConfig
                    .selectedToShowValue
            "
            (ngModelChange)="selectToShowValue($event)"
        >
            {{ 'Show Value in Traffic Light' | translate }}
        </mat-checkbox>
    </sp-split-section>
</sp-visualization-config-outer>
