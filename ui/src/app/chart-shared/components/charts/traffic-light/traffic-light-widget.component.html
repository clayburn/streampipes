<div
    fxFlex="100"
    fxLayoutAlign="center center"
    fxLayout="column"
    class="main-panel"
    [ngStyle]="{
        background: dataExplorerWidget.baseAppearanceConfig.backgroundColor,
        color: dataExplorerWidget.baseAppearanceConfig.textColor,
        overflowX: 'auto'
    }"
>
    @if (showNoDataInDateRange) {
        <sp-no-data-in-date-range [viewDateRange]="timeSettings" class="h-100">
        </sp-no-data-in-date-range>
    }

    <div
        class="traffic-light-wrapper"
        fxFlex
        fxLayout="column"
        fxLayoutAlign="center center"
    >
        <div
            class="tl-container"
            [ngClass]="selectedToShowValue ? 'no-border-container' : ''"
        >
            <div
                class="light"
                [ngClass]="{ 'light-red': activeClass === 'red' }"
            ></div>
            <div
                class="light"
                [ngClass]="{ 'light-yellow': activeClass === 'yellow' }"
            ></div>
            <div
                class="light"
                [ngClass]="{ 'light-green': activeClass === 'green' }"
            ></div>
        </div>
        <div class="light-value-container">
            @if (selectedToShowValue) {
                <div class="light-value text-md">
                    {{ displayed_value }}
                </div>
            }
        </div>
    </div>
</div>
