<sp-configuration-box [title]="'Export Settings' | translate">
    <div>
        <sp-configuration-box [title]="'Download Format' | translate">
            <mat-radio-group
                class="sp-radio-group"
                [(ngModel)]="
                    dataRetentionConfig.exportConfig.exportConfig.format
                "
            >
                <mat-radio-button
                    value="json"
                    class="sp-radio-button"
                    data-cy="download-configuration-json"
                >
                    JSON
                </mat-radio-button>
                <mat-radio-button
                    value="csv"
                    class="sp-radio-button"
                    data-cy="download-configuration-csv"
                >
                    CSV
                </mat-radio-button>
                <mat-radio-button
                    value="xlsx"
                    class="sp-radio-button"
                    data-cy="download-configuration-xlsx"
                >
                    EXCEL (XLSX)
                </mat-radio-button>
            </mat-radio-group>
        </sp-configuration-box>
    </div>

    @if (dataRetentionConfig.exportConfig.exportConfig.format === 'csv') {
        <sp-configuration-box [title]="'Delimiter' | translate">
            <mat-radio-group
                [(ngModel)]="
                    dataRetentionConfig.exportConfig.exportConfig.delimiter
                "
                class="sp-radio-group"
            >
                <mat-radio-button
                    value="comma"
                    class="sp-radio-button"
                    data-cy="download-configuration-delimiter-comma"
                    >&nbsp;,
                </mat-radio-button>
                <mat-radio-button
                    value="semicolon"
                    class="sp-radio-button"
                    data-cy="download-configuration-delimiter-semicolon"
                    >&nbsp;;
                </mat-radio-button>
            </mat-radio-group>
        </sp-configuration-box>
    }
    <mat-form-field appearance="fill" class="sp-select-field">
        <mat-label>{{ 'Select Provider' | translate }}</mat-label>
        <mat-select
            [(ngModel)]="
                dataRetentionConfig.exportConfig.exportProviderSettings
                    .providerType
            "
            data-cy="exportProvider-select"
        >
            <mat-option value="local" data-cy="exportProvider-local">
                {{ 'local' | translate }}
            </mat-option>
        </mat-select>
    </mat-form-field>
</sp-configuration-box>
