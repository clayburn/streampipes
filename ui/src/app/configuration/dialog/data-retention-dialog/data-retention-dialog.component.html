<div class="sp-dialog-container">
    <div class="sp-dialog-content p-15">
        <div fxFlex="100">
            <!-- Stepper removed, content displayed directly -->
            <div
                class="retention-step-content"
                *ngIf="retentionConfig?.dataRetentionConfig"
            >
                <sp-select-data
                    [dataExplorerDataConfig]="
                        dataRetentionDialogModel.dataExplorerDataConfig
                    "
                    [dataRetentionConfig]="retentionConfig"
                >
                </sp-select-data>
            </div>
            @if (
                retentionConfig?.dataRetentionConfig?.action?.includes('SAVE')
            ) {
                <sp-data-export
                    [dataExplorerDataConfig]="
                        dataRetentionDialogModel.dataExplorerDataConfig
                    "
                    [dataRetentionConfig]="retentionConfig"
                >
                </sp-data-export>
            }
        </div>
    </div>
    <mat-divider></mat-divider>
    <div class="sp-dialog-actions" fxLayoutGap="10px">
        <button
            mat-flat-button
            color="accent"
            data-cy="download-configuration-download-btn"
            (click)="setCleanUp()"
            [disabled]="requiresExportValidation() && !isExportValid()"
        >
            {{ 'Start Sync' | translate }}
        </button>

        <button
            mat-flat-button
            color="accent"
            data-cy="download-configuration-download-btn"
            [disabled]="!disableDelete"
            (click)="deleteCleanUp()"
        >
            {{ 'Delete Sync' | translate }}
        </button>
        <button
            mat-flat-button
            class="mat-basic"
            style="margin-right: 10px"
            (click)="exitDialog()"
        >
            {{ 'Close' | translate }}
        </button>
    </div>
</div>
