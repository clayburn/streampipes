<div class="sp-dialog-container">
    <div class="sp-dialog-content p-15">
        <div *ngIf="!isInProgress" fxLayout="column">
            <div fxFlex="100" fxLayoutAlign="center center" fxLayout="column">
                <b *ngIf="deleteDialog"
                    ><h4>
                        {{
                            confirmDeleteMessage
                                | translate: { index: measurementIndex }
                        }}
                    </h4></b
                >
                <b *ngIf="!deleteDialog"
                    ><h4>
                        {{
                            confirmTruncateMessage
                                | translate: { index: measurementIndex }
                        }}
                    </h4></b
                >
                <b
                    ><h5>
                        {{ 'This operation cannot be undone.' | translate }}
                    </h5></b
                >
            </div>

            <div fxFlex="100" fxLayoutAlign="center center" fxLayout="column">
                <button
                    mat-button
                    mat-flat-button
                    color="accent"
                    data-cy="confirm-truncate-data-btn"
                    *ngIf="!deleteDialog"
                    (click)="truncateData()"
                >
                    {{ 'Truncate Data' | translate }}
                </button>
                <button
                    mat-button
                    mat-flat-button
                    color="accent"
                    data-cy="confirm-delete-data-btn"
                    *ngIf="deleteDialog"
                    (click)="deleteData()"
                >
                    {{ 'Delete Data' | translate }}
                </button>
            </div>
        </div>
        <div
            fxFlex="100"
            fxLayoutAlign="center center"
            fxLayout="column"
            *ngIf="isInProgress"
            data-cy="adapter-deletion-in-progress"
        >
            <div fxLayout="row" fxLayoutAlign="space-around">
                <mat-spinner
                    [mode]="'indeterminate'"
                    color="accent"
                ></mat-spinner>
            </div>
            <b
                ><h4>{{ currentStatus }}</h4></b
            >
        </div>
    </div>
    <mat-divider></mat-divider>
    <div class="sp-dialog-actions actions-align-right">
        <button
            mat-button
            mat-flat-button
            class="mat-basic"
            (click)="close(false)"
        >
            {{ 'Close' | translate }}
        </button>
    </div>
</div>
