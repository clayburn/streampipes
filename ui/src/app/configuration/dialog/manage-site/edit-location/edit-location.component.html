<div fxLayout="column" [formGroup]="siteAreaControl">
    <sp-split-section
        [level]="3"
        fxFlex="100"
        [title]="'Site' | translate"
        [subtitle]="'Choose a name for your site' | translate"
    >
        <mat-form-field color="accent" class="w-100" subscriptSizing="dynamic">
            <input
                data-cy="sites-dialog-site-input"
                matInput
                formControlName="label"
                [placeholder]="'New site' | translate"
            />
            @if (siteAreaControl.get('label').hasError('required')) {
                <mat-error>
                    {{ 'Site name is required' | translate }}
                </mat-error>
            }
        </mat-form-field>
    </sp-split-section>
    <sp-split-section
        [level]="3"
        [title]="'Areas' | translate"
        [subtitle]="
            'Available areas within the site (e.g. plants or facilities)'
                | translate
        "
    >
        <sp-edit-asset-location-area-component [site]="site" fxFlex="100">
        </sp-edit-asset-location-area-component>
    </sp-split-section>
    @if (locationConfig.locationEnabled) {
        <sp-split-section
            [level]="3"
            [title]="'Location' | translate"
            [subtitle]="'Exact location of the site' | translate"
        >
            <sp-single-marker-map
                fxFlex="100"
                [locationConfig]="locationConfig"
                [assetLocation]="site.location"
                formControlName="location"
            >
            </sp-single-marker-map>
        </sp-split-section>
    }
</div>
