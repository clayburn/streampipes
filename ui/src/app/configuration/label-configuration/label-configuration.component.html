<sp-basic-nav-tabs [spNavigationItems]="tabs" [activeLink]="'labels'">
    <div fxLayout="column" class="page-container-padding-inner">
        <sp-split-section
            [title]="'Labels' | translate"
            [subtitle]="
                'Configure labels which can be assigned to assets and other resources'
                    | translate
            "
        >
            <div
                fxLayout="row"
                fxLayoutAlign="start start"
                fxLayoutGap="10px"
                section-actions
            >
                <button
                    mat-button
                    mat-flat-button
                    color="accent"
                    data-cy="new-label-button"
                    (click)="createLabelMode = true"
                >
                    <i class="material-icons">add</i
                    ><span>&nbsp;{{ 'New' | translate }}</span>
                </button>
            </div>
            @if (createLabelMode) {
                <div class="mb-10">
                    <sp-edit-label
                        (cancelEmitter)="createLabelMode = false"
                        (saveEmitter)="saveLabel($event)"
                    ></sp-edit-label>
                </div>
            }
            @for (label of allLabels; track label) {
                <div
                    fxLayout="column"
                    class="label-item"
                    data-cy="available-labels-list"
                >
                    <div
                        fxLayout="row"
                        fxLayoutAlign="start center"
                        fxLayoutGap="10px"
                    >
                        <sp-label
                            size="small"
                            fxFlex="20"
                            [labelText]="label.label"
                            [labelBackground]="label.color"
                            data-cy="label-text"
                        >
                        </sp-label>
                        @if (!isEditMode(label._id)) {
                            <span fxFlex="50">{{ label.description }}</span>
                        }
                        <div fxFlex fxLayoutAlign="end center">
                            @if (!isEditMode(label._id)) {
                                <button
                                    mat-icon-button
                                    [matTooltip]="'Edit label' | translate"
                                    color="accent"
                                    (click)="editedLabels.push(label._id)"
                                >
                                    <i class="material-icons">edit</i>
                                </button>
                            }
                            <button
                                mat-icon-button
                                [matTooltip]="'Delete label' | translate"
                                class="btn-warn"
                                (click)="deleteLabel(label)"
                                data-cy="delete-label-button"
                            >
                                <i class="material-icons">delete</i>
                            </button>
                        </div>
                    </div>
                    @if (isEditMode(label._id)) {
                        <div fxLayout="column">
                            <sp-edit-label
                                [editMode]="true"
                                [showPreview]="false"
                                [label]="label"
                                (cancelEmitter)="removeEditedLabel(label._id)"
                                (saveEmitter)="updateLabel(label)"
                            >
                            </sp-edit-label>
                        </div>
                    }
                </div>
            }
        </sp-split-section>
    </div>
</sp-basic-nav-tabs>
