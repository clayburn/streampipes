<sp-basic-nav-tabs [spNavigationItems]="tabs" [activeLink]="'security'">
    <div fxLayout="column" class="page-container-padding-inner">
        <div fxFlex="100" fxLayout="column" fxLayoutAlign="start start">
            <sp-split-section
                [title]="'User Accounts' | translate"
                [subtitle]="'Add and edit user accounts' | translate"
            >
                <button
                    section-actions
                    mat-flat-button
                    data-cy="add-new-user"
                    (click)="createUserAccount()"
                >
                    <i class="material-icons">add</i
                    ><span>&nbsp;{{ 'New' | translate }}</span>
                </button>
                <sp-security-user-config></sp-security-user-config>
            </sp-split-section>
        </div>

        <div fxFlex="100" fxLayout="column" fxLayoutAlign="start start">
            <sp-split-section
                [title]="'Service Accounts' | translate"
                [subtitle]="'Add and edit service accounts' | translate"
            >
                <button
                    section-actions
                    mat-button
                    mat-flat-button
                    color="accent"
                    (click)="createServiceAccount()"
                >
                    <i class="material-icons">add</i
                    ><span>&nbsp;{{ 'New' | translate }}</span>
                </button>
                <sp-security-service-config></sp-security-service-config>
            </sp-split-section>
        </div>

        <div fxFlex="100" fxLayout="column" fxLayoutAlign="start start">
            <sp-split-section
                [title]="'Groups' | translate"
                [subtitle]="'Manage user groups' | translate"
            >
                <button
                    section-actions
                    mat-button
                    mat-flat-button
                    color="accent"
                    data-cy="new-user-group-btn"
                    (click)="createGroup()"
                >
                    <i class="material-icons">add</i
                    ><span>&nbsp;{{ 'New' | translate }}</span>
                </button>
                <sp-security-user-group-config></sp-security-user-group-config>
            </sp-split-section>
        </div>
        <div fxFlex="100" fxLayout="column" fxLayoutAlign="start start">
            <sp-split-section
                [title]="'Roles' | translate"
                [subtitle]="'Manage roles' | translate"
            >
                <button
                    section-actions
                    mat-button
                    mat-flat-button
                    color="accent"
                    (click)="createRole()"
                >
                    <i class="material-icons">add</i
                    ><span>&nbsp;{{ 'New' | translate }}</span>
                </button>
                <sp-security-role-config></sp-security-role-config>
            </sp-split-section>
        </div>

        <div fxFlex="100" fxLayout="column" fxLayoutAlign="start start">
            <sp-split-section
                [title]="'Authentication' | translate"
                [subtitle]="'Auth & token settings' | translate"
            >
                <div class="subsection-title">
                    {{ 'JWT Signature' | translate }}
                </div>
                <sp-authentication-configuration></sp-authentication-configuration>
            </sp-split-section>
        </div>
    </div>
</sp-basic-nav-tabs>
