<div
    class="adapter-catalog-item"
    fxFlex="100"
    fxLayout="column"
    (click)="selectAdapter(adapter.appId)"
>
    <div fxLayout="column">
        <div
            class="type"
            fxLayout="row"
            fxLayoutAlign="start start"
            fxFlex="100"
        >
            <div class="adapter-icon large-icon">
                @if (iconUrl) {
                    <img [src]="iconUrl" class="icon" />
                }
            </div>
            <div
                class="p-5 ml-10 h-100"
                fxFlex
                fxLayoutAlign="start start"
                fxLayout="column"
            >
                <div fxLayout="column" fxLayoutAlign="end start">
                    <span class="adapter-name">{{ adapter.name }}</span>
                </div>
                <div
                    fxFlex="100"
                    fxLayout="row wrap"
                    fxLayoutGap="10px"
                    fxLayoutAlign="end end"
                >
                    <button
                        fxFlex
                        mat-flat-button
                        (click)="selectAdapter(adapter.appId)"
                        [matTooltip]="'Create adapter' | translate"
                    >
                        <span>{{ 'Create' | translate }}</span>
                        <mat-icon>add</mat-icon>
                    </button>
                    <button
                        mat-flat-button
                        class="mat-basic"
                        (click)="openDocumentation($event)"
                        [matTooltip]="'Show documentation' | translate"
                    >
                        <span>{{ 'Docs' | translate }}</span>
                        <mat-icon>menu_book</mat-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
