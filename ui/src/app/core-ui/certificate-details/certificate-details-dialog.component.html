<div class="sp-dialog-container">
    <div class="sp-dialog-content p-15">
        <div fxLayout="column">
            @for (key of Object.keys(certificate); track $index) {
                @if (
                    key !== 'elementId' &&
                    key !== 'rev' &&
                    key !== 'certificateDerBase64'
                ) {
                    <div fxLayout="row" fxLayoutGap="10px" class="p-5">
                        <div fxFlex="30">
                            <b>{{ key }}</b>
                        </div>
                        <div fxFlex="70">
                            @if (isArray(certificate[key])) {
                                <div fxLayout="row wrap" fxLayoutGap="5px">
                                    @for (
                                        item of certificate[key];
                                        track $index
                                    ) {
                                        <sp-label
                                            tone="neutral"
                                            shape="badge"
                                            size="small"
                                            [labelText]="item"
                                            class="mb-10"
                                        ></sp-label>
                                    }
                                </div>
                            } @else {
                                <small>{{ certificate[key] }}</small>
                            }
                        </div>
                    </div>
                }
            }
        </div>
    </div>
    <mat-divider></mat-divider>
    <div class="sp-dialog-actions actions-align-right">
        <button mat-button mat-flat-button class="mat-basic" (click)="close()">
            {{ 'Close' | translate }}
        </button>
    </div>
</div>
