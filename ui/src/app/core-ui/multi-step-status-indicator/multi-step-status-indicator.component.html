<div fxLayout="column" fxLayoutGap="10px">
    @for (step of statusIndicators; track step) {
        <div fxLayout="column">
            <div
                fxLayout="row"
                fxLayoutGap="30px"
                fxFlex="100"
                fxLayoutAlign="start center"
            >
                @if (step.status === Status.PROGRESS) {
                    <div>
                        <mat-spinner
                            [diameter]="25"
                            color="accent"
                        ></mat-spinner>
                    </div>
                }
                @if (step.status === Status.SUCCESS) {
                    <div fxLayoutAlign="start center">
                        <i class="material-icons status-icon">check_circle</i>
                    </div>
                }
                @if (step.status === Status.FAILURE) {
                    <div fxLayoutAlign="start centers">
                        <i class="material-icons status-icon">error</i>
                    </div>
                }
                <div fxFlex class="text-md" fxLayoutAlign="start center">
                    {{ step.message }}
                </div>
            </div>
        </div>
    }
</div>
