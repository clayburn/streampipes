<div [formGroup]="parentForm" id="formWrapper" fxFlex="100" fxLayout="column">
    <div>
        <button
            mat-button
            mat-flat-button
            color="accent"
            class="small-button"
            data-cy="sp-reload"
            (click)="loadOptionsFromRestApi()"
            [disabled]="!showOptions"
            style="margin-right: 10px; margin-left: 10px"
        >
            <span>{{ 'Reload' | translate }}</span>
        </button>
    </div>
    @if (error) {
        <div fxLayout="column" class="mt-10">
            <sp-exception-message
                [message]="errorMessage"
            ></sp-exception-message>
        </div>
    }
    @if (!loading) {
        <div fxLayout="column">
            <div fxFlex fxLayout="row">
                @if (showOptions || staticProperty.options) {
                    <div fxLayout="column" style="margin-left: 10px">
                        @for (option of staticProperty.options; track option) {
                            <mat-radio-button
                                (click)="select(option.elementId)"
                                [attr.data-cy]="option.name"
                                [checked]="option.selected"
                            >
                                <label style="font-weight: normal">
                                    {{ option.name }}
                                </label>
                            </mat-radio-button>
                        }
                    </div>
                }
                @if (!showOptions && !loading) {
                    <div fxLayout="column" class="mt-10">
                        <span>{{ '(waiting for input)' | translate }}</span>
                    </div>
                }
                @if (loading) {
                    <div fxLayout="column">
                        <mat-spinner
                            color="accent"
                            [mode]="'indeterminate'"
                            [diameter]="20"
                        ></mat-spinner>
                    </div>
                }
            </div>
        </div>
    }
</div>
