<div class="sp-dialog-container">
    <div class="sp-dialog-content p-15">
        <div fxFlex="100">
            <div
                fxFlex="100"
                fxLayout="column"
                style="margin: 5px; width: 100%"
            >
                <mat-form-field class="w-100" floatLabel="auto" color="accent">
                    <mat-label>{{ 'Dashboard title' | translate }}</mat-label>
                    <input
                        id="dvname"
                        #dvname="ngModel"
                        required
                        matInput
                        data-cy="data-view-name"
                        [(ngModel)]="dashboard.name"
                    />
                    <mat-error>{{
                        'Title must not be empty' | translate
                    }}</mat-error>
                </mat-form-field>
                <mat-form-field class="w-100" color="accent">
                    <mat-label>{{ 'Description' | translate }}</mat-label>
                    <input matInput [(ngModel)]="dashboard.description" />
                </mat-form-field>
                <div class="mt-10" fxLayout="column">
                    <label>{{ 'Default view mode' | translate }}</label>
                    <mat-radio-group
                        [(ngModel)]="
                            dashboard.dashboardGeneralSettings.defaultViewMode
                        "
                    >
                        <mat-radio-button
                            class="view-radio-button"
                            [value]="'grid'"
                        >
                            {{ 'Grid view' | translate }}
                        </mat-radio-button>
                        <mat-radio-button
                            class="view-radio-button"
                            [value]="'slide'"
                        >
                            {{ 'Slide view' | translate }}
                        </mat-radio-button>
                    </mat-radio-group>
                </div>
                <div class="mt-10" fxLayout="column">
                    <label>{{ 'Time settings' | translate }}</label>
                    <mat-checkbox
                        [(ngModel)]="
                            dashboard.dashboardGeneralSettings.globalTimeEnabled
                        "
                        >{{
                            'Use global time settings instead of chart time settings'
                                | translate
                        }}
                    </mat-checkbox>
                </div>
                <!--<mat-checkbox [(ngModel)]="dashboard.displayHeader">Show name and description in dashboard</mat-checkbox>-->
            </div>
        </div>
    </div>
    <mat-divider></mat-divider>
    <div class="sp-dialog-actions actions-align-right">
        <button
            mat-button
            mat-raised-button
            class="mat-basic mr-10"
            (click)="onCancel()"
        >
            {{ 'Close' | translate }}
        </button>
        <button
            [disabled]="dvname.invalid"
            mat-button
            mat-raised-button
            color="accent"
            data-cy="save-data-view"
            (click)="onSave()"
        >
            {{ (createMode ? 'Create' : 'Save') | translate }}
        </button>
    </div>
</div>
