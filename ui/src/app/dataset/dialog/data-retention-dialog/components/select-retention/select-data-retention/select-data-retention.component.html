<sp-split-section [level]="3" [title]="'Data Retention Intervals' | translate">
    <sp-form-field [level]="3" [label]="'Everything older than' | translate">
        <mat-form-field class="w-100">
            <input
                matInput
                type="number"
                [(ngModel)]="
                    dataRetentionConfig.dataRetentionConfig.olderThanDays
                "
                min="1"
                step="1"
            />
            <span matSuffix class="pr-10">{{ 'days' | translate }}</span>
        </mat-form-field>
    </sp-form-field>
</sp-split-section>
