<div fxLayout="row" class="page-container-padding">
    @if (profileLoaded) {
        <div fxFlex="100" fxLayout="column" fxLayoutAlign="start start">
            <sp-split-section
                [level]="2"
                [title]="'Profile' | translate"
                [subtitle]="
                    'Manage your basic profile settings here' | translate
                "
            >
                @if (isExternalUser) {
                    <sp-alert-banner
                        type="info"
                        [title]="
                            'Settings for externally-managed users cannot be changed'
                                | translate
                        "
                    >
                    </sp-alert-banner>
                }
                <div fxLayout="row" fxLayoutAlign="start center">
                    <span>{{ userData.username }}</span>
                    <button
                        [disabled]="isExternalUser"
                        mat-button
                        mat-flat-button
                        color="accent"
                        class="ml-15"
                        (click)="openChangeEmailDialog()"
                    >
                        {{ 'Change email' | translate }}
                    </button>
                </div>
                <sp-form-field [level]="2" [label]="'Full name' | translate">
                    <mat-form-field fxFlex color="accent">
                        <input
                            [disabled]="isExternalUser"
                            [(ngModel)]="userData.fullName"
                            matInput
                        />
                    </mat-form-field>
                </sp-form-field>
                <sp-form-field [level]="2" [label]="'Language' | translate">
                    <mat-form-field fxFlex color="accent">
                        <mat-select [(ngModel)]="selectedLanguage">
                            @for (lang of availableLanguages; track lang) {
                                <mat-option [value]="lang.id">
                                    {{ lang.label }}
                                </mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                </sp-form-field>
                <div fxLayout="row" fxLayoutAlign="start center">
                    <button
                        mat-button
                        mat-flat-button
                        color="accent"
                        (click)="saveProfileSettings()"
                    >
                        {{ 'Update profile' | translate }}
                    </button>
                    <button
                        [disabled]="isExternalUser"
                        mat-button
                        mat-flat-button
                        color="accent"
                        class="ml-15"
                        (click)="openChangePasswordDialog()"
                    >
                        {{ 'Change password' | translate }}
                    </button>
                </div>
            </sp-split-section>
            <sp-split-section
                [level]="2"
                [title]="'Appearance' | translate"
                [subtitle]="
                    'Change the look and feel of your installation' | translate
                "
            >
                <sp-form-field [level]="2" [label]="'Color scheme' | translate">
                    <mat-radio-group
                        [(ngModel)]="darkMode"
                        aria-labelledby="radio-group-label"
                        class="appearance-radio-group"
                        (ngModelChange)="changeModePreview($event)"
                    >
                        <mat-radio-button
                            [value]="false"
                            class="appearance-radio-button"
                            >{{ 'Light mode' | translate }}</mat-radio-button
                        >
                        <mat-radio-button
                            [value]="true"
                            class="appearance-radio-button"
                            >{{ 'Dark mode' | translate }}</mat-radio-button
                        >
                    </mat-radio-group>
                </sp-form-field>
                <div>
                    <button
                        mat-button
                        mat-flat-button
                        color="accent"
                        (click)="updateAppearanceMode()"
                    >
                        {{ 'Save color schema' | translate }}
                    </button>
                </div>
            </sp-split-section>
        </div>
    }
</div>
